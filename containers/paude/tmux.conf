# Use tmux-256color as the default terminal inside tmux sessions.
# Falls back to screen-256color if tmux-256color terminfo is missing.
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
    'set-option -g default-terminal "tmux-256color"' \
    'set-option -g default-terminal "screen-256color"'

# Enable true color (RGB) passthrough for outer terminals that support it
set-option -sa terminal-overrides ",xterm*:Tc,screen*:Tc,tmux*:Tc"

# Propagate COLORTERM from the outer environment into tmux sessions
set-option -ga update-environment " COLORTERM"
